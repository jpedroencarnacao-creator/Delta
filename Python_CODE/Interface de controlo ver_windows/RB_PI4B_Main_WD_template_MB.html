<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>PI_4B Control Panel — Mobile</title>
<style>

:root {
    --bg:          #f0f0f0;
    --panel:       #ffffff;
    --border:      #cccccc;
    --text:        #333333;
    --accent:      #337ab7;
    --accent-dark: #225a8a;
    --green-on:    #28a745;
    --green-off:   #1f7a33;
    --red-on:      #d9534f;
    --red-off:     #9f3b38;
    --yellow:      #ffd84d;
    --gray:        #6c757d;
    --radius:      10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: var(--bg); color: var(--text); }

/* Botão de modo */
.btn-mode {
    font-weight: bold; font-size: 15px; padding: 10px 18px;
    border-radius: 14px; border: 2px solid; cursor: pointer; min-width: 140px;
}
.btn-mode.cliente { background: var(--accent); color: white; border-color: #8ec5ff; }
.btn-mode.dev     { background: var(--yellow); color: black; border-color: #d9534f; }

/* Botões grandes Start/Stop */
.btn-big {
    font-weight: bold; font-size: 18px; padding: 16px 8px;
    border-radius: var(--radius); border: 2px solid black;
    cursor: pointer; width: 140px; height: 70px;
}
.btn-big.on-green  { background: var(--green-on);  color: white; box-shadow: 0 0 12px 3px rgba(40,167,69,.7); }
.btn-big.off-green { background: var(--green-off); color: #ccc; }
.btn-big.on-red    { background: var(--red-on);    color: white; box-shadow: 0 0 12px 3px rgba(217,83,79,.7); }
.btn-big.off-red   { background: var(--red-off);   color: #ccc; }

/* Botão Mode */
.btn-mode-action {
    font-weight: bold; font-size: 18px; padding: 16px 8px;
    border-radius: var(--radius); border: 2px solid black;
    background: var(--accent); color: white;
    cursor: pointer; width: 140px; height: 70px;
}

/* Indicador de ligação série */
.conn-indicator {
    font-size: 18px; padding: 6px 10px; border-radius: 8px;
    border: none; cursor: pointer; font-weight: bold;
    width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
}
.conn-off        { background: #e0e0e0; color: #888; }
.conn-connecting { background: #fff3cd; color: #b8860b;
                   animation: blink 1s infinite; }
.conn-on         { background: #e6f7ea; color: var(--green-on); }
.conn-error      { background: #fdeaea; color: var(--red-on);
                   animation: blink 1s infinite; }
@keyframes blink {
    0%,100% { opacity:1; } 50% { opacity:0.3; }
}

/* Botões de modo de movimento */
.mode-option {
    padding: 12px 8px; border-radius: var(--radius);
    border: 2px solid black; cursor: pointer; font-weight: bold;
    background: #d1d5db; color: black; font-size: 14px;
    transition: background .15s;
}
.mode-option.mode-selected {
    background: var(--yellow); border-color: black;
}

/* Monitor serial */
.serial-monitor {
    width: 100%; font-family: monospace; font-size: 13px;
    background: #1e1e1e; color: #d4d4d4; border: none;
    border-radius: 8px; padding: 10px; resize: none;
}

/* Botão de controlo */
.btn-ctrl {
    padding: 10px 16px; border-radius: 8px; border: none;
    cursor: pointer; font-weight: bold; font-size: 14px; color: white;
}
.btn-ctrl.danger  { background: #d9534f; }
.btn-ctrl.dark    { background: black;
                    box-shadow: 0 0 0 2px white, 0 0 0 4px black; }
.btn-ctrl.gray    { background: var(--gray); }
.btn-ctrl.blue    { background: var(--accent); }
.btn-ctrl.green   { background: #28a745; }
.btn-ctrl.scroll-btn { background: #e0e0e0; color: #555; }
.btn-ctrl.scroll-btn.active { background: var(--accent); color: white; }

/* Modais */
.modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.45);
    align-items: center; justify-content: center; z-index: 1000;
}
.modal-card {
    background: white; border-radius: 16px; padding: 24px;
    box-shadow: 0 18px 50px rgba(0,0,0,.25);
    max-width: 95vw;
}
.modal-card input {
    width: 100%; padding: 10px; border: 1px solid #ccc;
    border-radius: 8px; font-size: 16px; margin: 10px 0;
}

/* Modal de configurações de movimentos no mobile */
.mov-frame-overlay {
    display: none; position: fixed; inset: 0; z-index: 1800;
    background: rgba(0,0,0,.55); padding: 10px;
}
.mov-frame-card {
    width: 100%; height: 100%; border-radius: 18px; overflow: hidden;
    background: #f0f0f0; display: flex; flex-direction: column;
    box-shadow: 0 18px 50px rgba(0,0,0,.32);
}
.mov-frame-header {
    flex-shrink: 0; background: #4a7c59; color: white;
    padding: 10px 12px; display: flex; align-items: center; justify-content: space-between; gap: 10px;
}
.mov-frame-header h2 { font-size: 16px; margin: 0; }
.mov-frame {
    flex: 1; width: 100%; border: none; background: #f0f0f0;
}
.client-mov-overlay {
    display: none; position: fixed; inset: 0; z-index: 1800;
    background: rgba(0,0,0,.55); padding: 10px;
}
.client-mov-card {
    width: 100%; height: 100%; border-radius: 18px; overflow: hidden;
    background: #f0f0f0; display: flex; flex-direction: column;
    box-shadow: 0 18px 50px rgba(0,0,0,.32);
}
.client-mov-header {
    flex-shrink: 0; background: #4a7c59; color: white;
    padding: 10px 12px; display: flex; align-items: center; justify-content: space-between; gap: 10px;
}
.client-mov-header h2 { font-size: 16px; margin: 0; }
.client-mov-tabs {
    flex-shrink: 0; display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 6px; padding: 10px; background: #e9e9e9; border-bottom: 1px solid #d2d2d2;
}
.client-mov-tab {
    border: 1px solid #cfcfcf; background: white; border-radius: 8px;
    padding: 10px 6px; font-weight: bold; color: #333; position: relative;
}
.client-mov-tab.active { border-color: #4a7c59; background: #e8f3eb; color: #2f5e3d; }
.client-mov-tab.dirty::after {
    content: ""; width: 8px; height: 8px; border-radius: 50%;
    background: #d99a00; position: absolute; right: 7px; top: 7px;
}
.client-mov-panel { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 12px; }
.client-mov-section {
    background: white; border: 1px solid #ddd; border-radius: 12px;
    padding: 12px; display: grid; gap: 10px;
}
.client-mov-section.dirty { border-color: #d99a00; box-shadow: 0 0 0 2px rgba(217,154,0,.12); }
.client-mov-section h3 { margin: 0; font-size: 16px; color: #4a7c59; }
.client-mov-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.client-mov-field label { display: block; font-size: 11px; color: #555; margin-bottom: 4px; }
.client-mov-field input {
    width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 9px;
    font-size: 16px; background: white;
}
.client-mov-field input.dirty {
    border-color: #d99a00;
    box-shadow: 0 0 0 2px rgba(217,154,0,.16);
    background: #fffaf0;
}
.client-mov-field.dirty label { color: #b27600; font-weight: bold; }
.client-mov-status { padding: 10px 12px; font-size: 13px; color: #555; background: #fff; border-top: 1px solid #ddd; }
.client-mov-actions { flex-shrink: 0; padding: 10px; background: #ececec; display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
@media (max-width: 380px) {
    .client-mov-fields { grid-template-columns: 1fr; }
}

body { padding: 16px; }
.app  { max-width: 480px; margin: 0 auto; display: grid; gap: 14px; }
.card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 20px; padding: 16px;
    box-shadow: 0 4px 8px rgba(0,0,0,.1);
}
.section-title {
    font-size: 13px; font-weight: bold; text-transform: uppercase;
    letter-spacing: .06em; color: #666; margin-bottom: 10px;
}
.brand { display: flex; align-items: center; gap: 12px; }
.brand h1 { font-size: 22px; }
.brand p  { font-size: 13px; color: #666; margin-top: 2px; }

/* Linha de topo: modo + conexão */
.top-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

/* Grid de botões */
.btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.btn-grid.single { grid-template-columns: 1fr; }
.btn-grid .btn-big { width: 100%; height: 60px; font-size: 16px; }
.btn-grid .btn-mode-action { width: 100%; height: 60px; font-size: 16px; }

/* Monitor serial */
.serial-monitor { height: 220px; }

/* Conn menu mobile */
.conn-menu-wrap { position: relative; }
.conn-menu {
    display: none; flex-direction: column; gap: 6px;
    position: absolute; top: 50px; left: 0;
    background: white; border: 1px solid #ccc;
    border-radius: 14px; padding: 10px; min-width: 180px;
    box-shadow: 0 4px 16px rgba(0,0,0,.18); z-index: 600;
}
</style>
</head>
<body>
<main class="app">

  <!-- Cabeçalho -->
  <section class="brand">
    <div>
      <h1>PI_4B Control</h1>
      <p>Interface remota</p>
    </div>
  </section>

  <!-- Modo + Ligação -->
  <section class="card">
    <div class="section-title">Controlo</div>
    <div class="top-row">
      <button id="modeBtn" class="btn-mode cliente" onclick="onModeBtn()">MODO CLIENTE</button>
      <div class="conn-menu-wrap">
        <button class="conn-indicator conn-off" onclick="onConnClick(this)" title="Desligado">🔗</button>
        <div class="conn-menu" id="connMenu">
          <button class="btn-ctrl blue" onclick="sendAction('serial_reconnect'); closeConnMenu();">Tentar reconectar</button>
          <button class="btn-ctrl danger dev-only" style="display:none"
                  onclick="sendAction('serial_disconnect'); closeConnMenu();">Desligar série</button>
        </div>
      </div>
    </div>
    <div style="margin-top: 10px;">
      <button onclick="openMovementsModal()"
         style="display:inline-block; padding:10px 16px; background:#337ab7; color:white;
                border-radius:8px; font-weight:bold; font-size:14px; border:none; width:100%; text-align:center;">
        ⚙ Configurações Movimentos
      </button>
    </div>
  </section>

  <!-- Start / Mode / Stop -->
  <section class="card">
    <div class="section-title">Ações</div>
    <div class="btn-grid">
      <button id="startBtn" class="btn-big off-green" onclick="sendAction('start')">Start</button>
      <button id="stopBtn"  class="btn-big on-red"   onclick="sendAction('stop')">Stop</button>
      <button class="btn-mode-action" style="grid-column:span 2"
              onclick="openModeDialog()">Mode</button>
    </div>
  </section>

  <!-- Monitor serial (só DEV) -->
  <section class="card dev-only" style="display:none">
    <div class="section-title" style="display:flex; justify-content:space-between">
      Monitor Serial
      <button id="scrollBtn" class="btn-ctrl scroll-btn active"
              onclick="toggleAutoScroll()" title="Auto-scroll: ON">⬇</button>
    </div>
    <textarea id="serialMonitor" class="serial-monitor" readonly></textarea>
    <div style="display:flex; gap:8px; margin-top:8px">
      <input id="serialInput" type="text" placeholder="Comando..."
             style="flex:1; padding:10px; border-radius:10px; border:1px solid #ccc; font-size:15px;"
             onkeydown="if(event.key==='Enter') sendManual()">
      <button class="btn-ctrl blue" onclick="sendManual()">Enviar</button>
    </div>
  </section>

  <!-- Desligar / Sair -->
  <section class="card">
    <div class="btn-grid">
      <button class="btn-ctrl danger" style="padding:14px"
              onclick="shutdownApp('desligar')">Desligar</button>
      <button class="btn-ctrl dark dev-only" style="padding:14px; display:none"
              onclick="shutdownApp('sair')">Sair</button>
    </div>
  </section>

</main>

<!-- MODAL: Configurações Movimentos Cliente -->
<div class="client-mov-overlay" id="clientMovModal">
  <div class="client-mov-card">
    <div class="client-mov-header">
      <h2>⚙ Configurações</h2>
      <button class="btn-ctrl gray" onclick="closeMovementsModal()">Fechar</button>
    </div>
    <div class="client-mov-tabs">
      <button class="client-mov-tab active" data-client-mov-tab="batimento" onclick="clientMovSelect('batimento')">Batimento</button>
      <button class="client-mov-tab" data-client-mov-tab="respiracao" onclick="clientMovSelect('respiracao')">Respiração</button>
      <button class="client-mov-tab" data-client-mov-tab="tosse" onclick="clientMovSelect('tosse')">Tosse</button>
    </div>
    <div class="client-mov-panel">
      <section class="client-mov-section" id="clientMovSection">
        <h3 id="clientMovTitle">Batimento</h3>
        <div class="client-mov-fields">
          <div class="client-mov-field"><label>Tempo do ciclo (s)</label><input type="number" step="0.1" min="0" id="client_periodo"></div>
          <div class="client-mov-field"><label>Espera inicial (s)</label><input type="number" step="0.1" min="0" id="client_espera_inicio"></div>
          <div class="client-mov-field"><label>Espera final (s)</label><input type="number" step="0.1" min="0" id="client_espera_fim"></div>
          <div class="client-mov-field"><label>Amplitude X</label><input type="number" step="0.1" min="0" id="client_amp_x"></div>
          <div class="client-mov-field"><label>Amplitude Y</label><input type="number" step="0.1" min="0" id="client_amp_y"></div>
        </div>
        <div class="client-mov-status" id="clientMovHint">Sem alterações.</div>
      </section>
    </div>
    <div class="client-mov-status" id="clientMovStatus">—</div>
    <div class="client-mov-actions">
      <button class="btn-ctrl gray" onclick="clientMovRestaurar()">Restaurar</button>
      <button class="btn-ctrl blue" onclick="clientMovGuardar()">Guardar</button>
      <button class="btn-ctrl green" onclick="clientMovEnviar()">Enviar</button>
    </div>
  </div>
</div>

<!-- MODAL: Configurações Movimentos Mobile -->
<div class="mov-frame-overlay" id="movModal">
  <div class="mov-frame-card">
    <div class="mov-frame-header">
      <h2>⚙ Configurações Movimentos</h2>
      <button class="btn-ctrl gray" onclick="closeMovementsModal()">Fechar</button>
    </div>
    <iframe class="mov-frame" id="movFrame" title="Configurações Movimentos"></iframe>
  </div>
</div>

<!-- MODAL: Password DEV -->
<div class="modal-overlay" id="passwordModal">
  <div class="modal-card" style="width:100%; max-width:360px">
    <h3 style="margin-bottom:8px">Acesso DEV</h3>
    <input id="passwordInput" type="password" placeholder="Password DEV"
           inputmode="text" autocomplete="current-password">
    <div style="display:flex; gap:8px; justify-content:flex-end; margin-top:8px">
      <button class="btn-ctrl gray"
              onclick="document.getElementById('passwordModal').style.display='none'">Cancelar</button>
      <button class="btn-ctrl blue" onclick="confirmPassword()">Entrar</button>
    </div>
  </div>
</div>

<!-- MODAL: Confirmar encerramento -->
<div class="modal-overlay" id="shutdownModal" onclick="if(event.target.id==='shutdownModal') closeShutdownDialog()">
  <div class="modal-card" style="width:100%; max-width:430px; padding:0; display:flow-root">
    <div style="margin:10px">
      <h3 style="margin-bottom:12px; text-align:center">Encerrar programa</h3>
      <p style="text-align:center; white-space:nowrap">Deseja proceguir com o encerramento do programa</p>
      <div style="display:flex; justify-content:space-between; gap:80px; margin-top:22px">
        <button class="btn-ctrl dark" style="min-width:130px; padding:12px 26px" onclick="closeShutdownDialog()">Não</button>
        <button class="btn-ctrl danger" style="min-width:130px; padding:12px 26px" onclick="confirmShutdown()">Sim</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL: Selecionar Modo -->
<div class="modal-overlay" id="modeModal" onclick="if(event.target.id==='modeModal') closeModeDialog()">
  <div class="modal-card" style="width:100%; max-width:480px">
    <h3 style="margin-bottom:16px">Selecionar Modo</h3>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
      <button class="mode-option" data-mode="Estatico"   onclick="selectMode('Estatico')">Estático</button>
      <button class="mode-option" data-mode="Respiracao" onclick="selectMode('Respiracao')">Respiração</button>
      <button class="mode-option" data-mode="Coracao"    onclick="selectMode('Coracao')">Coração</button>
      <div style="display:flex; flex-direction:column; align-items:center; gap:4px">
        <button class="mode-option" style="width:100%" data-mode="Humano" onclick="selectMode('Humano')">Humano</button>
        <small style="color:#555">(Resp+Bati)</small>
      </div>
      <div style="display:flex; flex-direction:column; align-items:center; gap:4px">
        <button class="mode-option" style="width:100%" data-mode="Completo" onclick="selectMode('Completo')">Completo</button>
        <small style="color:#555">(Resp+Bati+Tosse)</small>
      </div>
    </div>
  </div>
</div>


<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
const socket = window.io ? io() : { on: () => {} };
if (!window.io) {
    setInterval(() => {
        fetch('/state').then(r => r.json()).then(applyState).catch(() => {});
    }, 1000);
}

// recebe atualização completa de estado
socket.on('state_update', (s) => {
    applyState(s);
});

// recebe só mudança de estágio da série
socket.on('serial_stage', (data) => {
    applySerialStage(data.stage);
});

socket.on('app_shutdown', () => {
    closeWindowAfterShutdown();
});

setInterval(() => {
    fetch('/shutdown_status')
        .then(r => r.json())
        .then(data => {
            if (data.shutdown) closeWindowAfterShutdown();
        })
        .catch(() => {});
}, 1000);

function applyState(s) {
    // modo DEV/CLIENTE
    const isDev = s.devmode === 1;
    const modeBtn = document.getElementById('modeBtn');
    if (modeBtn) {
        modeBtn.textContent = isDev ? 'MODO DEV' : 'MODO CLIENTE';
        modeBtn.className = 'btn-mode ' + (isDev ? 'dev' : 'cliente');
    }
    document.querySelectorAll('.dev-only').forEach(el => {
        el.style.display = isDev ? '' : 'none';
    });

    // start / stop
    const startBtn = document.getElementById('startBtn');
    const stopBtn  = document.getElementById('stopBtn');
    if (startBtn) startBtn.className = 'btn-big ' + (s.start_state === 1 ? 'on-green'  : 'off-green');
    if (stopBtn)  stopBtn.className  = 'btn-big ' + (s.stop_state  === 1 ? 'on-red'    : 'off-red');

    // modo de movimento
    document.querySelectorAll('.mode-option').forEach(btn => {
        btn.classList.toggle('mode-selected', btn.dataset.mode === s.mode_state);
    });

    // histórico serial
    const mon = document.getElementById('serialMonitor');
    if (mon) {
        const tail = (s.history_tail || []).join('\\n');
        if (mon.value !== tail) {
            mon.value = tail;
            if (window.autoScroll) mon.scrollTop = mon.scrollHeight;
        }
    }

    applySerialStage(s.serial_stage);
}

function applySerialStage(stage) {
    document.querySelectorAll('.conn-indicator').forEach(btn => {
        btn.dataset.stage = stage;
        const map = {
            disconnected: {icon: '🔗', cls: 'conn-off',       tip: 'Desligado'},
            connecting:   {icon: '↻',  cls: 'conn-connecting', tip: 'A ligar...'},
            connected:    {icon: '🔗', cls: 'conn-on',         tip: 'Ligado'},
            error:        {icon: '⚠',  cls: 'conn-error',      tip: 'Erro de ligação'},
        };
        const m = map[stage] || map.disconnected;
        btn.textContent  = m.icon;
        btn.className    = 'conn-indicator ' + m.cls;
        btn.title        = m.tip;
    });
}

window.autoScroll = true;

function toggleAutoScroll() {
    window.autoScroll = !window.autoScroll;
    const btn = document.getElementById('scrollBtn');
    if (btn) {
        btn.classList.toggle('active', window.autoScroll);
        btn.title = 'Auto-scroll: ' + (window.autoScroll ? 'ON' : 'OFF');
    }
}

function sendAction(action, body={}) {
    fetch('/' + action, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body),
    }).catch(err => console.error('Erro:', err));
}

let pendingShutdownAction = 'desligar';

function shutdownApp(action='desligar') {
    pendingShutdownAction = action;
    document.getElementById('shutdownModal').style.display = 'flex';
}

function closeShutdownDialog() {
    document.getElementById('shutdownModal').style.display = 'none';
}

function confirmShutdown() {
    const action = pendingShutdownAction || 'desligar';
    closeShutdownDialog();
    fetch('/' + action, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: '{}',
    });
    closeWindowAfterShutdown();
}

function closeWindowAfterShutdown() {
    if (window._closingAfterShutdown) return;
    window._closingAfterShutdown = true;
    document.documentElement.innerHTML =
        '<head><title>Programa encerrado</title></head>' +
        '<body style="margin:0;background:#f0f0f0;font-family:Arial,sans-serif;"></body>';
    setTimeout(() => {
        window.open('', '_self');
        window.close();
    }, 150);
    setTimeout(() => {
        window.location.replace('about:blank');
    }, 700);
}

function onModeBtn() {
    const isDev = document.getElementById('modeBtn')
                    .classList.contains('dev');
    if (isDev) {
        sendAction('toggle_devmode');
    } else {
        document.getElementById('passwordModal').style.display = 'flex';
        document.getElementById('passwordInput').value = '';
        document.getElementById('passwordInput').focus();
    }
}

function confirmPassword() {
    const pw = document.getElementById('passwordInput').value;
    sendAction('toggle_devmode', {password: pw});
    document.getElementById('passwordModal').style.display = 'none';
}

function openModeDialog() {
    document.getElementById('modeModal').style.display = 'flex';
}

function closeModeDialog() {
    document.getElementById('modeModal').style.display = 'none';
}

function selectMode(modeName) {
    sendAction('select_mode', {mode: modeName});
    closeModeDialog();
}

function onConnClick(btn) {
    const stage = btn.dataset.stage || 'disconnected';
    const isDev = document.getElementById('modeBtn')
                    .classList.contains('dev');
    if (isDev) {
        if (stage === 'connecting' || stage === 'error') {
            document.getElementById('connMenu').style.display = 'flex';
        } else if (stage === 'connected') {
            sendAction('serial_disconnect');
        } else {
            sendAction('serial_connect');
        }
    } else {
        if (stage === 'error') {
            sendAction('serial_reconnect');
        }
    }
}

function closeConnMenu() {
    document.getElementById('connMenu').style.display = 'none';
}

// fecha modais ao clicar fora
document.addEventListener('click', (e) => {

    if (connMenu && !connMenu.contains(e.target) &&
        !e.target.classList.contains('conn-indicator')) {
        connMenu.style.display = 'none';
    }
});

// fecha modal de password com Enter
document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
        const pwModal = document.getElementById('passwordModal');
        if (pwModal && pwModal.style.display === 'flex') confirmPassword();

<script>
function sendManual() {
    const input = document.getElementById('serialInput');
    const cmd = input.value.trim();
    if (!cmd) return;
    sendAction('send_serial', {command: cmd});
    input.value = '';
}

function openMovementsModal() {
    const isDev = document.getElementById('modeBtn').classList.contains('dev');
    if (!isDev) {
        document.getElementById('clientMovModal').style.display = 'block';
        clientMovCarregarConfig();
        return;
    }
    const modal = document.getElementById('movModal');
    const frame = document.getElementById('movFrame');
    const template = document.getElementById('movementsMobileTemplate');
    modal.style.display = 'block';
    if (!frame.dataset.loaded) {
        const doc = frame.contentWindow.document;
        const html = template.innerHTML.replace(
            '<head>',
            '<head><base href="' + window.location.origin + '/">'
        );
        doc.open();
        doc.write(html);
        doc.close();
        frame.dataset.loaded = '1';
    }
}

function closeMovementsModal() {
    document.getElementById('movModal').style.display = 'none';
    document.getElementById('clientMovModal').style.display = 'none';
}

const CLIENT_MOVEMENTS = {
    batimento: {
        title: 'Batimento Cardíaco',
        movKey: 'batimento',
        readAmp: cfg => ({x: cfg.curva1?.a ?? 0, y: cfg.curva1?.b ?? 0}),
        writeAmp: (cfg, x, y) => {
            cfg.curva1 = cfg.curva1 || {};
            cfg.curva1.a = x;
            cfg.curva1.b = y;
        },
    },
    respiracao: {
        title: 'Respiração',
        movKey: 'respiracao',
        readAmp: cfg => ({x: cfg.curva2?.largura ?? 0, y: cfg.curva2?.altura ?? 0}),
        writeAmp: (cfg, x, y) => {
            cfg.curva2 = cfg.curva2 || {};
            cfg.curva2.largura = x;
            cfg.curva2.altura = y;
        },
    },
    tosse: {
        title: 'Tosse',
        movKey: 'tosse',
        readAmp: cfg => {
            const raio = cfg.curva3?.raio ?? 0;
            return {x: raio, y: raio};
        },
        writeAmp: (cfg, x, y) => {
            cfg.curva3 = cfg.curva3 || {};
            cfg.curva3.raio = Math.max(x, y);
        },
    },
};

let _clientMovConfig = {};
let _clientMovSaved = {};
let _clientMovActive = 'batimento';
let _clientMovDirty = {};
let _clientMovDraftTimer = null;
const CLIENT_FIELD_IDS = [
    'client_periodo',
    'client_espera_inicio',
    'client_espera_fim',
    'client_amp_x',
    'client_amp_y',
];

function cloneConfig(obj) {
    return JSON.parse(JSON.stringify(obj || {}));
}

function clientMovSetStatus(msg, cor) {
    const el = document.getElementById('clientMovStatus');
    if (!el) return;
    el.textContent = msg;
    el.style.color = cor || '#555';
}

function clientMovNum(id) {
    const el = document.getElementById(id);
    return el && el.value !== '' ? Number(el.value) : 0;
}

function clientMovSetVal(id, val) {
    const el = document.getElementById(id);
    if (el) el.value = val ?? 0;
}

function clientMovReadFieldsIntoConfig() {
    const def = CLIENT_MOVEMENTS[_clientMovActive];
    if (!def) return;
    const mov = _clientMovConfig[def.movKey] = _clientMovConfig[def.movKey] || {};
    mov.periodo = clientMovNum('client_periodo');
    mov.espera_inicio = clientMovNum('client_espera_inicio');
    mov.espera_fim = clientMovNum('client_espera_fim');
    def.writeAmp(_clientMovConfig, clientMovNum('client_amp_x'), clientMovNum('client_amp_y'));
}

function clientMovSnapshotKey(key, cfg) {
    const def = CLIENT_MOVEMENTS[key];
    const mov = (cfg || {})[def.movKey] || {};
    const amp = def.readAmp(cfg || {});
    return JSON.stringify({
        periodo: Number(mov.periodo || 0),
        espera_inicio: Number(mov.espera_inicio || 0),
        espera_fim: Number(mov.espera_fim || 0),
        amp_x: Number(amp.x || 0),
        amp_y: Number(amp.y || 0),
    });
}

function clientMovRefreshDirty() {
    clientMovReadFieldsIntoConfig();
    Object.keys(CLIENT_MOVEMENTS).forEach(key => {
        _clientMovDirty[key] = clientMovSnapshotKey(key, _clientMovConfig) !== clientMovSnapshotKey(key, _clientMovSaved);
        const tab = document.querySelector(`[data-client-mov-tab="${key}"]`);
        if (tab) tab.classList.toggle('dirty', _clientMovDirty[key]);
    });
    const dirty = !!_clientMovDirty[_clientMovActive];
    const section = document.getElementById('clientMovSection');
    const hint = document.getElementById('clientMovHint');
    clientMovRefreshDirtyInputs();
    if (section) section.classList.toggle('dirty', dirty);
    if (hint) {
        hint.textContent = dirty ? 'Alterações ainda não guardadas.' : 'Sem alterações.';
        hint.style.color = dirty ? '#b27600' : '#4a7c59';
        hint.style.fontWeight = dirty ? 'bold' : 'normal';
    }
}

function clientMovScheduleDraftSave() {
    clearTimeout(_clientMovDraftTimer);
    _clientMovDraftTimer = setTimeout(clientMovSaveDraftNow, 250);
}

function clientMovSaveDraftNow() {
    clientMovReadFieldsIntoConfig();
    return fetch('/movements/draft', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(_clientMovConfig),
    }).catch(() => null);
}

function clientMovRefreshDirtyInputs() {
    const def = CLIENT_MOVEMENTS[_clientMovActive];
    const savedMov = (_clientMovSaved || {})[def.movKey] || {};
    const savedAmp = def.readAmp(_clientMovSaved || {});
    const savedValues = {
        client_periodo: Number(savedMov.periodo || 0),
        client_espera_inicio: Number(savedMov.espera_inicio || 0),
        client_espera_fim: Number(savedMov.espera_fim || 0),
        client_amp_x: Number(savedAmp.x || 0),
        client_amp_y: Number(savedAmp.y || 0),
    };
    CLIENT_FIELD_IDS.forEach(id => {
        const input = document.getElementById(id);
        if (!input) return;
        const current = input.value !== '' ? Number(input.value) : 0;
        const changed = current !== savedValues[id];
        input.classList.toggle('dirty', changed);
        input.closest('.client-mov-field')?.classList.toggle('dirty', changed);
    });
}

function clientMovRenderActive() {
    const def = CLIENT_MOVEMENTS[_clientMovActive];
    const mov = _clientMovConfig[def.movKey] || {};
    const amp = def.readAmp(_clientMovConfig);
    document.getElementById('clientMovTitle').textContent = def.title;
    clientMovSetVal('client_periodo', mov.periodo);
    clientMovSetVal('client_espera_inicio', mov.espera_inicio);
    clientMovSetVal('client_espera_fim', mov.espera_fim);
    clientMovSetVal('client_amp_x', amp.x);
    clientMovSetVal('client_amp_y', amp.y);
    document.querySelectorAll('[data-client-mov-tab]').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.clientMovTab === _clientMovActive);
    });
    clientMovRefreshDirty();
}

function clientMovSelect(key) {
    clientMovReadFieldsIntoConfig();
    clientMovSaveDraftNow();
    _clientMovActive = key;
    clientMovRenderActive();
}

function clientMovCarregarConfig() {
    clientMovSetStatus('A carregar...', '#777');
    fetch('/movements/draft')
      .then(r => r.json())
      .then(res => {
        const cfg = res.config || {};
        _clientMovConfig = cloneConfig(cfg);
        _clientMovSaved = cloneConfig(res.saved || cfg);
        _clientMovDirty = {};
        clientMovRenderActive();
        clientMovSetStatus(res.has_draft ? 'Rascunho temporário carregado.' : 'Configurações carregadas.', '#28a745');
      })
      .catch(() => clientMovSetStatus('Erro ao carregar configurações.', '#d9534f'));
}

function clientMovGuardar() {
    clientMovReadFieldsIntoConfig();
    clientMovSetStatus('A guardar...', '#b8860b');
    fetch('/movements/config', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(_clientMovConfig),
    })
    .then(r => r.json())
    .then(res => {
      if (!res.ok) {
        clientMovSetStatus('Erro ao guardar.', '#d9534f');
        return;
      }
      _clientMovSaved = cloneConfig(_clientMovConfig);
      clearTimeout(_clientMovDraftTimer);
      clientMovRefreshDirty();
      clientMovSetStatus('Configurações guardadas.', '#28a745');
    })
    .catch(() => clientMovSetStatus('Erro ao guardar.', '#d9534f'));
}

function clientMovRestaurar() {
    clearTimeout(_clientMovDraftTimer);
    fetch('/movements/draft', {method:'DELETE'})
      .then(r => r.json())
      .then(res => {
        _clientMovSaved = cloneConfig(res.config || _clientMovSaved);
        _clientMovConfig = cloneConfig(_clientMovSaved);
        clientMovRenderActive();
        clientMovSetStatus('Valores restaurados a partir do ficheiro interno.', '#4a7c59');
      })
      .catch(() => clientMovSetStatus('Erro ao restaurar.', '#d9534f'));
}

function clientMovEnviar() {
    clientMovReadFieldsIntoConfig();
    clientMovRefreshDirty();
    clientMovSetStatus('Envio para o ESP32 ainda não está configurado. Usa Guardar para gravar no ficheiro interno.', '#b8860b');
}

document.querySelectorAll('#clientMovModal input[type="number"]').forEach(input => {
    input.addEventListener('input', () => {
      clientMovRefreshDirty();
      clientMovScheduleDraftSave();
    });
});

// redirect automático para desktop se não for mobile em portrait
function checkDevice() {
    const isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
    const isPortrait = window.innerHeight > window.innerWidth;
    if (!isMobile || !isPortrait) window.location.replace('/');
}
checkDevice();
window.addEventListener('resize', checkDevice);

fetch('/state').then(r => r.json()).then(applyState);
</script>

function setVal(id, val) {
    const el = document.getElementById(id);
    if (el && val !== undefined && val !== null) el.value = val;
}

function num(id) {
    const el = document.getElementById(id);
    return el && el.value !== '' ? Number(el.value) : 0;
}

function int(id) {
    return Math.round(num(id));
}

function movCarregarConfig() {
    movSetStatus('A carregar...', '#555');
    fetch('/movements/config')
      .then(r => r.json())
      .then(cfg => {
        _movConfig = cfg || {};
        const c1 = cfg.curva1 || {};
        setVal('c1_a', c1.a); setVal('c1_b', c1.b); setVal('c1_xc', c1.xc); setVal('c1_yc', c1.yc);
        setVal('c1_alpha_deg', c1.alpha_deg); setVal('c1_n_pontos', c1.n_pontos); setVal('c1_sentido', c1.sentido || 'ccw');
        const c2 = cfg.curva2 || {};
        setVal('c2_altura', c2.altura); setVal('c2_largura', c2.largura); setVal('c2_n_pontos', c2.n_pontos); setVal('c2_theta_deg', c2.theta_deg);
        const c3 = cfg.curva3 || {};
        setVal('c3_raio', c3.raio); setVal('c3_n_pontos', c3.n_pontos); setVal('c3_sentido', c3.sentido || 'ccw');
        ['respiracao', 'batimento', 'tosse', 'vibracao_tosse'].forEach(chave => {
          const m = cfg[chave] || {};
          setVal(`${chave}_periodo`, m.periodo);
          setVal(`${chave}_espera_inicio`, m.espera_inicio);
          setVal(`${chave}_espera_fim`, m.espera_fim);
          setVal(`${chave}_ponto_inicio`, m.ponto_inicio);
          movAtualizarPontos(chave, {x:m.pontos_x, y:m.pontos_y, z:m.pontos_z});
        });
        movCalcular();
        movSetStatus('Configurações carregadas.', '#28a745');
      })
      .catch(e => movSetStatus('Erro ao carregar: ' + e, '#d9534f'));
}

function movLerCampos() {
    return {
      curva1: {a:num('c1_a'), b:num('c1_b'), xc:num('c1_xc'), yc:num('c1_yc'), alpha_deg:num('c1_alpha_deg'), n_pontos:int('c1_n_pontos'), sentido:document.getElementById('c1_sentido').value},
      curva2: {altura:num('c2_altura'), largura:num('c2_largura'), n_pontos:int('c2_n_pontos'), theta_deg:num('c2_theta_deg')},
      curva3: {raio:num('c3_raio'), n_pontos:int('c3_n_pontos'), sentido:document.getElementById('c3_sentido').value},
      respiracao: movLerMov('respiracao'),
      batimento: movLerMov('batimento'),
      tosse: movLerMov('tosse'),
      vibracao_tosse: movLerMov('vibracao_tosse'),
    };
}

function movLerMov(chave) {
    return {
      periodo: num(`${chave}_periodo`),
      espera_inicio: num(`${chave}_espera_inicio`),
      espera_fim: num(`${chave}_espera_fim`),
      ponto_inicio: int(`${chave}_ponto_inicio`),
    };
}

function movCalcular() {
    movSetStatus('A calcular...', '#b8860b');
    ['batimento', 'respiracao', 'tosse_vibracao'].forEach(id => {
      const ph = document.getElementById(`graf_${id}_ph`);
      const container = document.getElementById(`graf_${id}`);
      if (ph) { ph.style.display = 'flex'; ph.textContent = 'A calcular...'; }
      if (container) container.querySelectorAll('img').forEach(i => i.remove());
    });
    fetch('/movements/calcular', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(movLerCampos()),
    })
    .then(r => r.json())
    .then(res => {
      if (!res.ok) {
        movSetStatus('Erro: ' + (res.error || 'desconhecido'), '#d9534f');
        return;
      }
      const g = res.graficos || {};
      movAtualizarGrafico('batimento', g.batimento_2d || g.c1_2d, g.batimento_3d || g.c1_3d);
      movAtualizarGrafico('respiracao', g.respiracao_2d || g.tosse_2d, g.respiracao_3d || g.tosse_3d);
      movAtualizarGrafico('tosse_vibracao', g.vibracao_tosse_2d, g.vibracao_tosse_3d);
      if (res.pontos_c1) movAtualizarPontos('batimento', res.pontos_c1);
      if (res.pontos_c2) movAtualizarPontos('respiracao', res.pontos_c2);
      if (res.pontos_c3) movAtualizarPontos('vibracao_tosse', res.pontos_c3);
      if (res.pontos_c2) movAtualizarPontos('tosse', res.pontos_c2);
      movSetStatus('Cálculo concluído.', '#28a745');
    })
    .catch(e => movSetStatus('Erro de comunicação: ' + e, '#d9534f'));
}

function movAtualizarGrafico(secId, img2d, img3d) {
    const container = document.getElementById(`graf_${secId}`);
    const ph = document.getElementById(`graf_${secId}_ph`);
    if (!container) return;
    container.querySelectorAll('img').forEach(i => i.remove());
    if (!img2d && !img3d) {
      if (ph) {
        ph.style.display = 'flex';
        ph.textContent = 'Sem gráfico recebido.';
      }
      return;
    }
    if (ph) ph.style.display = 'none';
    [img3d, img2d].forEach((src, idx) => {
      if (!src) return;
      const img = document.createElement('img');
      img.src = src;
      img.alt = idx === 0 ? '3D' : '2D';
      container.appendChild(img);
    });
}

function movAtualizarPontos(chave, pts) {
    const fmt = arr => (arr || []).map(v => (+v).toFixed(3)).join(', ');
    const upd = (id, html) => { const el = document.getElementById(id); if (el) el.innerHTML = html; };
    upd(`${chave}_pts_x`, '<b>X:</b> ' + fmt(pts.x));
    upd(`${chave}_pts_y`, '<b>Y:</b> ' + fmt(pts.y));
    upd(`${chave}_pts_z`, '<b>Z:</b> ' + fmt(pts.z));
}

function movGuardar() {
    movSetStatus('A guardar...', '#b8860b');
    fetch('/movements/config', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(movLerCampos()),
    })
    .then(r => r.json())
    .then(res => movSetStatus(res.ok ? 'Guardado.' : 'Erro ao guardar.', res.ok ? '#28a745' : '#d9534f'))
    .catch(e => movSetStatus('Erro ao guardar: ' + e, '#d9534f'));
}

function movRecarregarESP() {
    movSetStatus('A ler ESP32...', '#b8860b');
    fetch('/movements/reload_from_esp', {method:'POST'})
      .then(r => r.json())
      .then(res => {
        if (!res.ok) {
          movSetStatus('Erro: ' + (res.error || (res.erros || []).join('; ')), '#d9534f');
          return;
        }
        movCarregarConfig();
      })
      .catch(e => movSetStatus('Erro: ' + e, '#d9534f'));
}

function showKeypad(input) {
    activeInput = input;
    const label = input.closest('.field')?.querySelector('label')?.textContent || 'Valor';
    document.getElementById('keypadTitle').textContent = label;
    document.getElementById('numKeypad').classList.add('visible');
    updateKeypad();
    setTimeout(() => input.scrollIntoView({block:'center', behavior:'smooth'}), 50);
}

function hideKeypad() {
    document.getElementById('numKeypad').classList.remove('visible');
    activeInput = null;
}

function updateKeypad() {
    document.getElementById('keypadDisplay').textContent = activeInput && activeInput.value ? activeInput.value : '—';
}

function keypadPress(value) {
    if (!activeInput) return;
    let current = activeInput.value || '';
    if (value === '.' && current.includes('.')) return;
    if (value === '-' && (current.includes('-') || current.length > 0)) return;
    activeInput.value = current + value;
    activeInput.dispatchEvent(new Event('input', {bubbles:true}));
    updateKeypad();
}

function keypadBackspace() {
    if (!activeInput) return;
    activeInput.value = activeInput.value.slice(0, -1);
    activeInput.dispatchEvent(new Event('input', {bubbles:true}));
    updateKeypad();
}

function keypadClear() {
    if (!activeInput) return;
    activeInput.value = '';
    activeInput.dispatchEvent(new Event('input', {bubbles:true}));
    updateKeypad();
}

document.querySelectorAll('input[type="number"]').forEach(input => {
    input.setAttribute('readonly', 'readonly');
    input.setAttribute('inputmode', 'none');
    input.addEventListener('focus', () => showKeypad(input));
    input.addEventListener('click', () => showKeypad(input));
});

movCarregarConfig();
</script>
